<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F9FD"/>
      <stop offset="100%" stop-color="#EBEDF5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity=".06"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 侧边栏示意框 -->
  <rect x="100" y="90" width="312" height="332" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow)"/>

  <!-- 侧边栏标题 -->
  <rect x="100" y="90" width="312" height="36" rx="16" fill="#F7FAFC"/>
  <rect x="100" y="112" width="312" height="14" fill="#F7FAFC"/>
  <circle cx="118" cy="108" r="5" fill="#CBD5E0"/>
  <text x="170" y="113" fill="#718096" font-size="12" font-family="sans-serif" font-weight="600" opacity=".6">标签列表</text>

  <!-- 列表项（tab 条目） -->
  <g filter="url(#shadow)">
    <!-- 条目 1：当前活动标签（高亮） -->
    <rect x="112" y="138" width="288" height="44" rx="8" fill="#FF6B6B" opacity=".08"/>
    <rect x="112" y="138" width="4" height="44" rx="2" fill="#FF6B6B"/>
    <circle cx="128" cy="160" r="6" fill="#FF6B6B" opacity=".6"/>
    <rect x="144" y="152" width="140" height="6" rx="3" fill="#FF6B6B" opacity=".5"/>
    <rect x="144" y="164" width="100" height="4" rx="2" fill="#FF6B6B" opacity=".3"/>
    <!-- 关闭按钮 -->
    <circle cx="382" cy="160" r="5" fill="#CBD5E0" opacity=".5"/>

    <!-- 条目 2 -->
    <rect x="112" y="190" width="288" height="44" rx="8"/>
    <circle cx="128" cy="212" r="6" fill="#0ABDE3" opacity=".5"/>
    <rect x="144" y="204" width="120" height="6" rx="3" fill="#A0AEC0" opacity=".5"/>
    <rect x="144" y="216" width="80" height="4" rx="2" fill="#A0AEC0" opacity=".3"/>
    <circle cx="382" cy="212" r="5" fill="#CBD5E0" opacity=".4"/>

    <!-- 条目 3 -->
    <rect x="112" y="242" width="288" height="44" rx="8"/>
    <circle cx="128" cy="264" r="6" fill="#6C5CE7" opacity=".5"/>
    <rect x="144" y="256" width="160" height="6" rx="3" fill="#A0AEC0" opacity=".5"/>
    <rect x="144" y="268" width="90" height="4" rx="2" fill="#A0AEC0" opacity=".3"/>
    <circle cx="382" cy="264" r="5" fill="#CBD5E0" opacity=".4"/>

    <!-- 条目 4 -->
    <rect x="112" y="294" width="288" height="44" rx="8"/>
    <circle cx="128" cy="316" r="6" fill="#FECA57" opacity=".5"/>
    <rect x="144" y="308" width="130" height="6" rx="3" fill="#A0AEC0" opacity=".5"/>
    <rect x="144" y="320" width="70" height="4" rx="2" fill="#A0AEC0" opacity=".3"/>
    <circle cx="382" cy="316" r="5" fill="#CBD5E0" opacity=".4"/>

    <!-- 条目 5 -->
    <rect x="112" y="346" width="288" height="44" rx="8"/>
    <circle cx="128" cy="368" r="6" fill="#A0AEC0" opacity=".4"/>
    <rect x="144" y="360" width="110" height="6" rx="3" fill="#A0AEC0" opacity=".4"/>
    <rect x="144" y="372" width="60" height="4" rx="2" fill="#A0AEC0" opacity=".2"/>
    <circle cx="382" cy="368" r="5" fill="#CBD5E0" opacity=".3"/>
  </g>
</svg>
