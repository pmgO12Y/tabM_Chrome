<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF512F"/>
      <stop offset="50%" stop-color="#DD2475"/>
      <stop offset="100%" stop-color="#8E2DE2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g fill="none" stroke="#FFFFFF" stroke-linejoin="round" filter="url(#shadow)">
    <!-- 四芒星 -->
    <polygon points="256,70 290,222 442,256 290,290 256,442 222,290 70,256 222,222" stroke-width="12"/>
    <!-- 内核圆 -->
    <circle cx="256" cy="256" r="16" fill="#FFFFFF" opacity=".25"/>
    <circle cx="256" cy="256" r="6" fill="#FFFFFF"/>
  </g>
</svg>
