<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF512F"/>
      <stop offset="100%" stop-color="#F09819"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity=".1"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g fill="none" stroke="#FFFFFF" stroke-linejoin="round" filter="url(#shadow)">
    <!-- 底层大三角 -->
    <polygon points="256,120 106,390 406,390" stroke-width="12"/>
    <!-- 分割横线 -->
    <line x1="180" y1="302" x2="332" y2="302" stroke-width="8" stroke-linecap="round"/>
    <line x1="218" y1="214" x2="294" y2="214" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
