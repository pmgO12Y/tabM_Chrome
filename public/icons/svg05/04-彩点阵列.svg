<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F9FD"/>
      <stop offset="100%" stop-color="#EBEDF5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 连接曲线（极淡背景连线） -->
  <path d="M 110 340 Q 180 280 256 240 Q 332 200 402 340" fill="none" stroke="#A0AEC0" stroke-width="1.5" opacity=".2"/>

  <!-- 主弧线彩点（从左下→右上→右下） -->
  <g>
    <!-- 点1：左下（起点） -->
    <circle cx="110" cy="340" r="10" fill="#FF6B6B"/>
    <!-- 点2 -->
    <circle cx="150" cy="290" r="13" fill="#FF9F43"/>
    <!-- 点3 -->
    <circle cx="200" cy="258" r="16" fill="#FECA57"/>
    <!-- 点4（中心最高点） -->
    <circle cx="256" cy="240" r="20" fill="#48DBFB"/>
    <circle cx="256" cy="240" r="8" fill="#FFFFFF" opacity=".4"/>
    <!-- 点5 -->
    <circle cx="312" cy="258" r="16" fill="#0ABDE3"/>
    <!-- 点6 -->
    <circle cx="362" cy="290" r="13" fill="#A29BFE"/>
    <!-- 点7：右下（终点） -->
    <circle cx="402" cy="340" r="10" fill="#C850C0"/>
  </g>

  <!-- 辅助小浮点（视觉丰富度） -->
  <circle cx="170" cy="240" r="4" fill="#FF6B6B" opacity=".3"/>
  <circle cx="230" cy="196" r="5" fill="#FECA57" opacity=".35"/>
  <circle cx="310" cy="196" r="5" fill="#48DBFB" opacity=".35"/>
  <circle cx="360" cy="240" r="4" fill="#A29BFE" opacity=".3"/>
  <circle cx="280" cy="310" r="4" fill="#0ABDE3" opacity=".25"/>
  <circle cx="200" cy="318" r="3.5" fill="#FF9F43" opacity=".25"/>
</svg>
