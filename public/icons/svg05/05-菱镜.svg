<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF512F"/>
      <stop offset="100%" stop-color="#DD2475"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 外棱形 -->
  <polygon points="256,70 442,256 256,442 70,256" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- 中棱形 -->
  <polygon points="256,148 364,256 256,364 148,256" fill="none" stroke="#FFFFFF" stroke-width="8" opacity=".55" stroke-linejoin="round"/>

  <!-- 内核点 -->
  <circle cx="256" cy="256" r="7" fill="#FFFFFF" opacity=".8"/>
</svg>
