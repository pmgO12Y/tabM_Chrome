<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F9FD"/>
      <stop offset="100%" stop-color="#EBEDF5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g fill="none" stroke-width="14" stroke-linecap="round">
    <g transform="translate(-10, 10)" filter="url(#shadow)">
      <rect x="120" y="120" width="272" height="272" rx="32" stroke="#6C5CE7"/>
    </g>
    <g transform="translate(10, -10)" filter="url(#shadow)">
      <rect x="170" y="170" width="172" height="172" rx="24" stroke="#E84393"/>
    </g>
  </g>
</svg>
