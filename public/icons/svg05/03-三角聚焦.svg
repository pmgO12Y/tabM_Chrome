<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11998E"/>
      <stop offset="100%" stop-color="#38EF7D"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 三角主体 -->
  <polygon points="256,95 130,390 382,390" fill="none" stroke="#FFFFFF" stroke-width="16" stroke-linejoin="round" filter="url(#shadow)"/>

  <!-- 中心聚焦点 -->
  <circle cx="256" cy="290" r="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="256" cy="290" r="5" fill="#11998E" opacity=".4"/>
</svg>
