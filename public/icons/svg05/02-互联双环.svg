<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4158D0"/>
      <stop offset="50%" stop-color="#C850C0"/>
      <stop offset="100%" stop-color="#FFCC70"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 左环 -->
  <circle cx="196" cy="256" r="110" fill="none" stroke="#FFFFFF" stroke-width="16" opacity=".92" filter="url(#shadow)"/>

  <!-- 右环 -->
  <circle cx="316" cy="256" r="110" fill="none" stroke="#FFFFFF" stroke-width="16" opacity=".92" filter="url(#shadow)"/>
</svg>
