<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F9FD"/>
      <stop offset="100%" stop-color="#EBEDF5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 树干 -->
  <path d="M 256 400 L 256 160" fill="none" stroke="#718096" stroke-width="5" stroke-linecap="round"/>

  <!-- 主枝干分叉 -->
  <g fill="none" stroke="#718096" stroke-width="3.5" stroke-linecap="round">
    <path d="M 256 250 L 180 200"/>
    <path d="M 256 250 L 332 200"/>
    <path d="M 256 190 L 170 140"/>
    <path d="M 256 190 L 342 140"/>
    <path d="M 256 310 L 200 280"/>
    <path d="M 256 310 L 312 280"/>
  </g>

  <!-- 标签叶节点 - 青色分支 -->
  <g filter="url(#shadow)">
    <rect x="152" y="120" width="48" height="40" rx="6" fill="#0ABDE3"/>
    <rect x="322" y="120" width="48" height="40" rx="6" fill="#0ABDE3"/>
    <rect x="174" y="185" width="48" height="36" rx="6" fill="#0ABDE3" opacity=".6"/>
  </g>

  <!-- 标签叶节点 - 紫色分支 -->
  <g filter="url(#shadow)">
    <rect x="306" y="185" width="48" height="36" rx="6" fill="#6C5CE7" opacity=".6"/>
    <rect x="175" y="265" width="48" height="34" rx="6" fill="#6C5CE7" opacity=".5"/>
    <rect x="289" y="265" width="48" height="34" rx="6" fill="#6C5CE7" opacity=".5"/>
  </g>

  <!-- 标签叶节点 - 珊瑚色（主节点） -->
  <g filter="url(#shadow)">
    <rect x="230" y="150" width="52" height="44" rx="8" fill="#FF6B6B"/>
    <!-- 活动指示线 -->
    <rect x="248" y="150" width="16" height="4" rx="2" fill="#FFFFFF" opacity=".5"/>
  </g>

  <!-- 根节点底部标注 -->
  <path d="M 230 400 L 256 400 L 282 400" fill="none" stroke="#718096" stroke-width="3" stroke-linecap="round"/>
  <rect x="220" y="410" width="72" height="18" rx="9" fill="#FF6B6B" opacity=".12"/>
  <circle cx="256" cy="419" r="3" fill="#718096" opacity=".4"/>
</svg>
