<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F9FD"/>
      <stop offset="100%" stop-color="#EBEDF5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity=".05"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- 4x4 点阵，间距 64，起始 (128,128) -->
  <!-- 非活跃点 -->
  <g fill="#CBD5E0" opacity=".5">
    <circle cx="128" cy="128" r="6"/><circle cx="192" cy="128" r="6"/>
    <circle cx="320" cy="128" r="6"/><circle cx="384" cy="128" r="6"/>
    <circle cx="128" cy="192" r="6"/><circle cx="384" cy="192" r="6"/>
    <circle cx="128" cy="320" r="6"/><circle cx="384" cy="320" r="6"/>
    <circle cx="128" cy="384" r="6"/><circle cx="192" cy="384" r="6"/>
    <circle cx="320" cy="384" r="6"/><circle cx="384" cy="384" r="6"/>
  </g>
  <!-- 活跃点（形成十字/加号模式） -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="128" r="12" fill="#FF6B6B"/>
    <circle cx="192" cy="192" r="10" fill="#FECA57"/>
    <circle cx="320" cy="192" r="10" fill="#FECA57"/>
    <circle cx="128" cy="256" r="8" fill="#0ABDE3"/>
    <circle cx="256" cy="256" r="16" fill="#4834D4"/>
    <circle cx="384" cy="256" r="8" fill="#0ABDE3"/>
    <circle cx="192" cy="320" r="10" fill="#FECA57"/>
    <circle cx="320" cy="320" r="10" fill="#FECA57"/>
    <circle cx="256" cy="384" r="12" fill="#FF6B6B"/>
  </g>
  <!-- 连接线（仅活跃点之间） -->
  <g stroke="#A0AEC0" stroke-width="1.5" opacity=".15">
    <line x1="256" y1="128" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="256" y2="384"/>
    <line x1="128" y1="256" x2="256" y2="256"/>
    <line x1="256" y1="256" x2="384" y2="256"/>
    <line x1="192" y1="192" x2="256" y2="256"/>
    <line x1="320" y1="192" x2="256" y2="256"/>
    <line x1="192" y1="320" x2="256" y2="256"/>
    <line x1="320" y1="320" x2="256" y2="256"/>
  </g>
</svg>
