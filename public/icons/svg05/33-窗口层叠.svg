<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F9FD"/>
      <stop offset="100%" stop-color="#EBEDF5"/>
    </linearGradient>
    <filter id="shadowDeep">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity=".1"/>
    </filter>
    <filter id="shadowMid">
      <feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000000" flood-opacity=".08"/>
    </filter>
    <filter id="shadowLight">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity=".06"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 窗口3（最底层 → 最右上） -->
  <g transform="translate(80, -40)" filter="url(#shadowDeep)">
    <rect x="100" y="140" width="220" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" opacity=".5"/>
    <rect x="100" y="140" width="220" height="30" rx="12" fill="#6C5CE7" opacity=".06"/>
    <circle cx="116" cy="155" r="4" fill="#CBD5E0"/>
    <!-- 内容示意 -->
    <rect x="112" y="182" width="196" height="8" rx="3" fill="#6C5CE7" opacity=".12"/>
    <rect x="112" y="200" width="160" height="8" rx="3" fill="#6C5CE7" opacity=".08"/>
    <rect x="112" y="218" width="180" height="8" rx="3" fill="#6C5CE7" opacity=".1"/>
  </g>

  <!-- 窗口2（中间层 → 居中偏右） -->
  <g transform="translate(40, -20)" filter="url(#shadowMid)">
    <rect x="100" y="140" width="220" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" opacity=".7"/>
    <rect x="100" y="140" width="220" height="30" rx="12" fill="#0ABDE3" opacity=".06"/>
    <circle cx="116" cy="155" r="4" fill="#CBD5E0"/>
    <rect x="112" y="182" width="196" height="8" rx="3" fill="#0ABDE3" opacity=".15"/>
    <rect x="112" y="200" width="140" height="8" rx="3" fill="#0ABDE3" opacity=".1"/>
    <rect x="112" y="218" width="170" height="8" rx="3" fill="#0ABDE3" opacity=".12"/>
  </g>

  <!-- 窗口1（最顶层 → 原始位置） -->
  <g filter="url(#shadowLight)">
    <rect x="100" y="140" width="220" height="280" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect x="100" y="140" width="220" height="30" rx="12" fill="#FF6B6B" opacity=".08"/>
    <circle cx="116" cy="155" r="4" fill="#CBD5E0"/>
    <circle cx="134" cy="155" r="4" fill="#CBD5E0"/>
    <circle cx="152" cy="155" r="4" fill="#CBD5E0"/>
    <!-- 窗口内标签列表 -->
    <rect x="112" y="182" width="196" height="10" rx="4" fill="#FF6B6B" opacity=".45"/>
    <rect x="112" y="204" width="140" height="10" rx="4" fill="#CBD5E0" opacity=".5"/>
    <rect x="112" y="226" width="180" height="10" rx="4" fill="#CBD5E0" opacity=".5"/>
    <rect x="112" y="248" width="120" height="10" rx="4" fill="#CBD5E0" opacity=".35"/>
    <rect x="112" y="270" width="160" height="10" rx="4" fill="#CBD5E0" opacity=".5"/>
  </g>

  <!-- 层叠偏移指示线 -->
  <g stroke="#CBD5E0" stroke-width="1" stroke-dasharray="3,3" opacity=".4">
    <line x1="380" y1="100" x2="380" y2="420"/>
    <line x1="420" y1="100" x2="420" y2="420"/>
  </g>
</svg>
