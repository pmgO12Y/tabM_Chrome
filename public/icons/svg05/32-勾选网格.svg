<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A00E0"/>
      <stop offset="100%" stop-color="#8E2DE2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity=".12"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 4x4 勾选网格 -->
  <!-- 行1：全选 -->
  <g filter="url(#shadow)">
    <rect x="100" y="110" width="70" height="60" rx="6" fill="#FFFFFF" opacity=".2"/>
    <rect x="180" y="110" width="70" height="60" rx="6" fill="#FFFFFF" opacity=".2"/>
    <rect x="260" y="110" width="70" height="60" rx="6" fill="#FFFFFF" opacity=".2"/>
    <rect x="340" y="110" width="70" height="60" rx="6" fill="#FFFFFF" opacity=".2"/>
  </g>
  <!-- 行1 勾选标记 -->
  <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 122 138 L 135 151 L 148 138"/>
    <path d="M 202 138 L 215 151 L 228 138"/>
    <path d="M 282 138 L 295 151 L 308 138"/>
    <path d="M 362 138 L 375 151 L 388 138"/>
  </g>

  <!-- 行2：混合状态 -->
  <g filter="url(#shadow)">
    <rect x="100" y="180" width="70" height="60" rx="6" fill="#FFFFFF" opacity=".2"/>
    <rect x="180" y="180" width="70" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity=".35"/>
    <rect x="260" y="180" width="70" height="60" rx="6" fill="#FFFFFF" opacity=".2"/>
    <rect x="340" y="180" width="70" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity=".35"/>
  </g>
  <!-- 行2 勾选 -->
  <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 122 208 L 135 221 L 148 208"/>
    <path d="M 282 208 L 295 221 L 308 208"/>
  </g>

  <!-- 行3：部分选中 -->
  <g filter="url(#shadow)">
    <rect x="100" y="250" width="70" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity=".35"/>
    <rect x="180" y="250" width="70" height="60" rx="6" fill="#FFFFFF" opacity=".2"/>
    <rect x="260" y="250" width="70" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity=".35"/>
    <rect x="340" y="250" width="70" height="60" rx="6" fill="#FFFFFF" opacity=".2"/>
  </g>
  <!-- 行3 勾选 -->
  <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 202 278 L 215 291 L 228 278"/>
    <path d="M 362 278 L 375 291 L 388 278"/>
  </g>

  <!-- 行4：全部未选 -->
  <g filter="url(#shadow)">
    <rect x="100" y="320" width="70" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity=".2"/>
    <rect x="180" y="320" width="70" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity=".2"/>
    <rect x="260" y="320" width="70" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity=".2"/>
    <rect x="340" y="320" width="70" height="60" rx="6" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity=".2"/>
  </g>

  <!-- 底部统计栏 -->
  <g filter="url(#shadow)">
    <rect x="146" y="410" width="220" height="28" rx="14" fill="#FFFFFF" opacity=".1"/>
  </g>
  <text x="256" y="429" fill="#FFFFFF" font-size="11" font-family="sans-serif" text-anchor="middle" opacity=".7">已选 8 项 / 共 16 项</text>
</svg>
