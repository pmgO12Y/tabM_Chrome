<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FEF9F5"/>
      <stop offset="100%" stop-color="#F5ECE6"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#EE5A24"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#55EFC4"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity=".08"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 卡片3（底层→青色，右上偏转） -->
  <g transform="rotate(14, 256, 256)" filter="url(#shadow)">
    <rect x="116" y="126" width="280" height="260" rx="28" fill="url(#card3)"/>
  </g>

  <!-- 卡片2（中层→紫色，居中） -->
  <g filter="url(#shadow)">
    <rect x="116" y="126" width="280" height="260" rx="28" fill="url(#card2)"/>
  </g>

  <!-- 卡片1（顶层→珊瑚色，左下偏转） -->
  <g transform="rotate(-14, 256, 256)" filter="url(#shadow)">
    <rect x="116" y="126" width="280" height="260" rx="28" fill="url(#card1)"/>
  </g>
</svg>
