<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8F9FD"/>
      <stop offset="100%" stop-color="#EBEDF5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity=".06"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 3x3 方格网格 -->
  <g>
    <!-- 列1：已选（填充色） -->
    <g filter="url(#shadow)">
      <rect x="110" y="120" width="82" height="82" rx="8" fill="#FF6B6B"/>
      <rect x="110" y="224" width="82" height="82" rx="8" fill="#FF6B6B"/>
      <rect x="110" y="328" width="82" height="82" rx="8" fill="#FF6B6B" opacity=".5"/>
    </g>
    <!-- 列2：未选（边框） -->
    <rect x="215" y="120" width="82" height="82" rx="8" fill="none" stroke="#CBD5E0" stroke-width="3"/>
    <rect x="215" y="224" width="82" height="82" rx="8" fill="none" stroke="#CBD5E0" stroke-width="3"/>
    <rect x="215" y="328" width="82" height="82" rx="8" fill="none" stroke="#CBD5E0" stroke-width="3"/>
    <!-- 列3：选中状态变化 -->
    <rect x="320" y="120" width="82" height="82" rx="8" fill="none" stroke="#CBD5E0" stroke-width="3"/>
    <g filter="url(#shadow)">
      <rect x="320" y="224" width="82" height="82" rx="8" fill="#4834D4"/>
      <rect x="320" y="328" width="82" height="82" rx="8" fill="#0ABDE3"/>
    </g>
  </g>

  <!-- 勾选标记 -->
  <g stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M 136 155 L 151 170 L 166 155"/>
    <path d="M 241 259 L 256 274 L 271 259"/>
    <path d="M 349 258 L 364 273 L 379 258"/>
    <path d="M 349 362 L 364 377 L 379 362"/>
  </g>

  <!-- 数量统计标识（底部"已选 N 项"的视觉示意） -->
  <g>
    <rect x="176" y="434" width="44" height="18" rx="9" fill="#FF6B6B" opacity=".15"/>
    <rect x="230" y="434" width="44" height="18" rx="9" fill="#4834D4" opacity=".15"/>
    <rect x="284" y="434" width="44" height="18" rx="9" fill="#0ABDE3" opacity=".15"/>
  </g>
  <circle cx="198" cy="443" r="3" fill="#FF6B6B" opacity=".5"/>
  <circle cx="252" cy="443" r="3" fill="#4834D4" opacity=".5"/>
  <circle cx="306" cy="443" r="3" fill="#0ABDE3" opacity=".5"/>
</svg>
