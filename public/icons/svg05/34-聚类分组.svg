<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2709C"/>
      <stop offset="100%" stop-color="#FF9472"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity=".08"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 聚类 A（左上 → 窗口1 的标签） -->
  <g>
    <!-- 聚类边界 -->
    <ellipse cx="180" cy="180" rx="80" ry="70" fill="none" stroke="#FFFFFF" stroke-width="2" opacity=".2" stroke-dasharray="4,4"/>
    <!-- 组标签 -->
    <text x="180" y="118" fill="#FFFFFF" font-size="9" font-family="monospace" text-anchor="middle" opacity=".35">窗口 A</text>
    <!-- 组内标签节点 -->
    <g filter="url(#shadow)">
      <circle cx="140" cy="150" r="12" fill="#FFFFFF" opacity=".5"/>
      <circle cx="190" cy="140" r="14" fill="#FFFFFF" opacity=".65"/>
      <circle cx="220" cy="170" r="10" fill="#FFFFFF" opacity=".4"/>
      <circle cx="160" cy="200" r="11" fill="#FFFFFF" opacity=".45"/>
      <circle cx="200" cy="210" r="9" fill="#FFFFFF" opacity=".35"/>
    </g>
  </g>

  <!-- 聚类 B（右上 → 窗口2 的标签） -->
  <g>
    <ellipse cx="330" cy="180" rx="75" ry="65" fill="none" stroke="#FFFFFF" stroke-width="2" opacity=".2" stroke-dasharray="4,4"/>
    <text x="330" y="122" fill="#FFFFFF" font-size="9" font-family="monospace" text-anchor="middle" opacity=".35">窗口 B</text>
    <g filter="url(#shadow)">
      <circle cx="300" cy="150" r="13" fill="#FFFFFF" opacity=".55"/>
      <circle cx="350" cy="145" r="11" fill="#FFFFFF" opacity=".45"/>
      <circle cx="370" cy="180" r="10" fill="#FFFFFF" opacity=".4"/>
      <circle cx="320" cy="200" r="12" fill="#FFFFFF" opacity=".5"/>
      <circle cx="355" cy="215" r="9" fill="#FFFFFF" opacity=".35"/>
    </g>
  </g>

  <!-- 聚类 C（底部 → 搜索结果 / 重复组） -->
  <g>
    <ellipse cx="256" cy="360" rx="90" ry="60" fill="none" stroke="#FBBF24" stroke-width="2" opacity=".35" stroke-dasharray="4,4"/>
    <text x="256" y="308" fill="#FBBF24" font-size="9" font-family="monospace" text-anchor="middle" opacity=".5">^ 重复组</text>
    <g filter="url(#glow)">
      <circle cx="220" cy="340" r="14" fill="#FBBF24" opacity=".7"/>
      <circle cx="260" cy="330" r="16" fill="#FBBF24" opacity=".8"/>
      <circle cx="300" cy="345" r="13" fill="#FBBF24" opacity=".65"/>
      <circle cx="240" cy="370" r="11" fill="#FBBF24" opacity=".5"/>
      <circle cx="280" cy="375" r="10" fill="#FBBF24" opacity=".45"/>
    </g>
  </g>

  <!-- 组间连接线（跨窗口 ID → 发现重复） -->
  <g stroke="#FBBF24" stroke-width="1.5" opacity=".25" fill="none" stroke-dasharray="3,3">
    <path d="M 220 170 Q 240 250 260 330"/>
    <path d="M 320 200 Q 300 260 260 330"/>
  </g>

  <!-- 重复匹配高亮 -->
  <g filter="url(#glow)">
    <circle cx="260" cy="330" r="6" fill="#FFFFFF" opacity=".9"/>
    <circle cx="190" cy="140" r="5" fill="#FFFFFF" opacity=".7"/>
    <circle cx="350" cy="145" r="5" fill="#FFFFFF" opacity=".7"/>
  </g>
</svg>
