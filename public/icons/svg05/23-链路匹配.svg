<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="50%" stop-color="#302B63"/>
      <stop offset="100%" stop-color="#24243E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 链接路径 A（上） - 代表一组标签 URL -->
  <g fill="none" stroke="#22D3EE" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity=".6">
    <path d="M 80 200 L 140 200 L 160 180 L 200 180 L 220 220 L 280 220"/>
  </g>
  <!-- 路径 A 的节点 -->
  <g fill="#22D3EE" opacity=".5">
    <circle cx="80" cy="200" r="6"/>
    <circle cx="140" cy="200" r="4"/>
    <circle cx="200" cy="180" r="4"/>
    <circle cx="280" cy="220" r="6"/>
  </g>

  <!-- 链接路径 B（下） - 代表另一组标签 URL -->
  <g fill="none" stroke="#E879F9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity=".6">
    <path d="M 80 300 L 130 300 L 170 280 L 220 280 L 240 240 L 280 240"/>
  </g>
  <!-- 路径 B 的节点 -->
  <g fill="#E879F9" opacity=".5">
    <circle cx="80" cy="300" r="6"/>
    <circle cx="130" cy="300" r="4"/>
    <circle cx="220" cy="280" r="4"/>
    <circle cx="280" cy="240" r="6"/>
  </g>

  <!-- 汇聚段（两条路径合并 → 检测到重复URL） -->
  <g filter="url(#glow)">
    <path d="M 280 220 L 320 240 L 360 240 L 400 260" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
    <path d="M 280 240 L 320 240 L 360 240 L 400 260" fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>
  </g>

  <!-- 合并点（两条 URL 在此重合 → 重复标签） -->
  <g filter="url(#glow)">
    <circle cx="320" cy="240" r="12" fill="#FBBF24" opacity=".95"/>
    <circle cx="320" cy="240" r="5" fill="#FFFFFF"/>
  </g>
  <circle cx="320" cy="240" r="22" fill="none" stroke="#FBBF24" stroke-width="2" opacity=".15"/>
  <circle cx="320" cy="240" r="36" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity=".08"/>

  <!-- 路径上其他位置的小匹配点 -->
  <g filter="url(#softGlow)">
    <circle cx="200" cy="180" r="4" fill="#FFFFFF" opacity=".4"/>
    <circle cx="220" cy="280" r="4" fill="#FFFFFF" opacity=".4"/>
  </g>

  <!-- 链路两端起始标注 -->
  <text x="70" y="185" fill="#22D3EE" font-size="10" font-family="monospace" opacity=".4">URL_A</text>
  <text x="70" y="315" fill="#E879F9" font-size="10" font-family="monospace" opacity=".4">URL_B</text>
</svg>
