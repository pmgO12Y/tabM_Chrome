<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FACFE"/>
      <stop offset="100%" stop-color="#00F2FE"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity=".1"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 从四个方向汇聚的箭头 → 向中心收集标签 -->
  <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#shadow)">
    <!-- 左上 -->
    <path d="M 100 100 Q 160 140 200 200"/>
    <polygon points="200,200 210,172 178,196" fill="#FFFFFF" stroke="none"/>
    <!-- 右上 -->
    <path d="M 412 100 Q 352 140 312 200"/>
    <polygon points="312,200 302,172 334,196" fill="#FFFFFF" stroke="none"/>
    <!-- 左下 -->
    <path d="M 100 412 Q 160 372 200 312"/>
    <polygon points="200,312 210,340 178,316" fill="#FFFFFF" stroke="none"/>
    <!-- 右下 -->
    <path d="M 412 412 Q 352 372 312 312"/>
    <polygon points="312,312 302,340 334,316" fill="#FFFFFF" stroke="none"/>
  </g>

  <!-- 外层分散的小圆点（待收集的标签） -->
  <g fill="#FFFFFF" opacity=".4">
    <circle cx="90" cy="90" r="7"/>
    <circle cx="130" cy="170" r="5"/>
    <circle cx="422" cy="90" r="7"/>
    <circle cx="382" cy="170" r="5"/>
    <circle cx="90" cy="422" r="7"/>
    <circle cx="170" cy="382" r="5"/>
    <circle cx="422" cy="422" r="7"/>
    <circle cx="342" cy="382" r="5"/>
  </g>

  <!-- 中心汇聚圆 -->
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="50" fill="#FFFFFF" opacity=".15"/>
    <circle cx="256" cy="256" r="36" fill="#FFFFFF" opacity=".25"/>
  </g>

  <!-- 中心勾选标记（"已选择"） -->
  <g filter="url(#glow)">
    <path d="M 236 256 L 250 270 L 278 240" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 脉冲光晕 -->
  <circle cx="256" cy="256" r="68" fill="none" stroke="#FFFFFF" stroke-width="2" opacity=".1"/>
</svg>
