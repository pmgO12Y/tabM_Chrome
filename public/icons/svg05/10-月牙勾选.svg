<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF512F"/>
      <stop offset="100%" stop-color="#F09819"/>
    </linearGradient>
    <mask id="crescent">
      <rect width="512" height="512" fill="white"/>
      <circle cx="300" cy="226" r="116" fill="black"/>
    </mask>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="246" cy="256" r="130" fill="#FFFFFF" mask="url(#crescent)" filter="url(#shadow)"/>
  <circle cx="178" cy="226" r="8" fill="#FFFFFF" opacity=".5" filter="url(#shadow)"/>
</svg>
