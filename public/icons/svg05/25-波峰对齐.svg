<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1A1A3E"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- 波形 A（上） - 代表一组标签的活动模式 -->
  <g fill="none" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".7">
    <path d="M 60 210 C 90 140, 120 170, 150 210 C 180 250, 210 180, 240 210 C 270 250, 300 170, 330 210 C 360 250, 390 180, 420 210 L 452 210"/>
  </g>

  <!-- 波形 B（下） - 代表另一组标签的活动模式 -->
  <g fill="none" stroke="#E879F9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".7">
    <path d="M 60 320 C 90 250, 120 280, 150 320 C 180 360, 210 290, 240 320 C 270 360, 300 280, 330 320 C 360 360, 390 290, 420 320 L 452 320"/>
  </g>

  <!-- 对齐标记线 - 两条波峰在此重叠（重复检测点） -->
  <g filter="url(#glow)">
    <line x1="150" y1="170" x2="150" y2="280" stroke="#FFFFFF" stroke-width="2" opacity=".6" stroke-dasharray="3,3"/>
    <line x1="240" y1="185" x2="240" y2="290" stroke="#FFFFFF" stroke-width="2" opacity=".6" stroke-dasharray="3,3"/>
    <line x1="330" y1="170" x2="330" y2="280" stroke="#FFFFFF" stroke-width="2" opacity=".6" stroke-dasharray="3,3"/>
  </g>

  <!-- 波峰对齐重合点 → 检测到的重复 -->
  <g filter="url(#softGlow)">
    <!-- 第一对齐点 -->
    <circle cx="150" cy="210" r="10" fill="#FBBF24" opacity=".95"/>
    <circle cx="150" cy="210" r="4" fill="#FFFFFF"/>
    <!-- 第二对齐点 -->
    <circle cx="240" cy="210" r="8" fill="#FBBF24" opacity=".8"/>
    <circle cx="240" cy="210" r="3" fill="#FFFFFF"/>
    <!-- 第三对齐点 -->
    <circle cx="330" cy="210" r="10" fill="#FBBF24" opacity=".95"/>
    <circle cx="330" cy="210" r="4" fill="#FFFFFF"/>
  </g>

  <!-- 对齐光晕 -->
  <circle cx="150" cy="210" r="20" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity=".12"/>
  <circle cx="330" cy="210" r="20" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity=".12"/>

  <!-- 基线 -->
  <line x1="60" y1="265" x2="452" y2="265" stroke="#FFFFFF" stroke-width="1" opacity=".08"/>
  <line x1="60" y1="265" x2="452" y2="265" stroke="#22D3EE" stroke-width="1" opacity=".15"/>

  <!-- 标签标注 -->
  <text x="60" y="180" fill="#22D3EE" font-size="8" font-family="monospace" opacity=".35">Tab_A</text>
  <text x="60" y="345" fill="#E879F9" font-size="8" font-family="monospace" opacity=".35">Tab_B</text>
</svg>
