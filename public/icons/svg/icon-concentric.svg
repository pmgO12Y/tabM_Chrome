<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 同心 - 嵌套方框 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#F5F7FA"/>
  <!-- 最外层 -->
  <rect x="8" y="8" width="112" height="112" rx="20" fill="none" stroke="#1F57FF" stroke-width="4" opacity="0.15"/>
  <!-- 第2层 -->
  <rect x="20" y="20" width="88" height="88" rx="14" fill="none" stroke="#FF4757" stroke-width="4" opacity="0.25"/>
  <!-- 第3层 -->
  <rect x="30" y="30" width="68" height="68" rx="10" fill="none" stroke="#FFC312" stroke-width="4" opacity="0.4"/>
  <!-- 第4层 -->
  <rect x="38" y="38" width="52" height="52" rx="8" fill="none" stroke="#1F57FF" stroke-width="4" opacity="0.55"/>
  <!-- 第5层 -->
  <rect x="46" y="46" width="36" height="36" rx="6" fill="none" stroke="#FF4757" stroke-width="4" opacity="0.7"/>
  <!-- 最内层 -->
  <rect x="54" y="54" width="20" height="20" rx="4" fill="#1F57FF" opacity="0.85"/>
  <circle cx="64" cy="64" r="4" fill="#fff"/>
</svg>