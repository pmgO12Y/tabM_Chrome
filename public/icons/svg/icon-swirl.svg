  <path d="M25 88 Q38 48 70 52 Q102 56 98 86" fill="none" stroke="#1F57FF" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <path d="M20 96 Q36 56 70 59 Q104 62 101 92" fill="none" stroke="#FFC312" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- 装饰光点 -->
