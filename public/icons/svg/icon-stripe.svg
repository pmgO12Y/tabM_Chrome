<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 条纹 - 大胆斜条纹 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#fff"/>
  <!-- 斜条纹图案 -->
  <g clip-path="url(#stripe-clip)">
    <rect x="0" y="0" width="128" height="128" fill="#fff"/>
    <line x1="-20" y1="0" x2="30" y2="128" stroke="#1F57FF" stroke-width="16"/>
    <line x1="6" y1="0" x2="56" y2="128" stroke="#fff" stroke-width="8"/>
    <line x1="30" y1="0" x2="80" y2="128" stroke="#1F57FF" stroke-width="16"/>
    <line x1="56" y1="0" x2="106" y2="128" stroke="#fff" stroke-width="8"/>
    <line x1="80" y1="0" x2="130" y2="128" stroke="#1F57FF" stroke-width="16"/>
    <line x1="106" y1="0" x2="156" y2="128" stroke="#fff" stroke-width="8"/>
  </g>
  <clipPath id="stripe-clip">
    <rect x="0" y="0" width="128" height="128" rx="24"/>
  </clipPath>
  <!-- 覆盖的透明标签形状 -->
  <rect x="34" y="34" width="60" height="60" rx="12" fill="none" stroke="#FF4757" stroke-width="4"/>
  <rect x="34" y="34" width="60" height="16" rx="12" fill="#FF4757" opacity="0.9"/>
  <rect x="34" y="44" width="60" height="6" fill="#FF4757"/>
  <!-- 标签白点 -->
  <circle cx="44" cy="42" r="3" fill="#fff" opacity="0.5"/>
  <rect x="50" y="40" width="20" height="4" rx="2" fill="#fff" opacity="0.3"/>
  <!-- 内部线条 -->
  <rect x="42" y="58" width="44" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
  <rect x="42" y="64" width="36" height="3" rx="1.5" fill="#fff" opacity="0.2"/>
  <rect x="42" y="70" width="40" height="3" rx="1.5" fill="#fff" opacity="0.15"/>
</svg>