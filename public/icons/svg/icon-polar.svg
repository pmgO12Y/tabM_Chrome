<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 概念 2：阴阳半切 - 左右分裂双色，中间悬浮标签图标 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#fff"/>
  <!-- 左半蓝色 -->
  <path d="M0 24 Q0 0 24 0 L104 0 Q128 0 128 24 L128 128 L0 128 Z" fill="#1F57FF"/>
  <!-- 右半 coral（用 clipPath 切掉左侧） -->
  <clipPath id="polar-clip">
    <rect x="64" y="0" width="64" height="128"/>
  </clipPath>
  <g clip-path="url(#polar-clip)">
    <rect x="0" y="0" width="128" height="128" rx="24" fill="#FF4757"/>
  </g>
  <!-- 中间悬浮标签图标 -->
  <rect x="44" y="44" width="40" height="40" rx="10" fill="#fff"/>
  <rect x="44" y="44" width="40" height="12" rx="10" fill="#F0F4FF"/>
  <rect x="44" y="50" width="40" height="6" fill="#F0F4FF"/>
  <rect x="50" y="48" width="18" height="4" rx="2" fill="#1F57FF" opacity="0.3"/>
  <rect x="52" y="62" width="24" height="3" rx="1.5" fill="#1F57FF" opacity="0.15"/>
  <rect x="52" y="68" width="20" height="3" rx="1.5" fill="#1F57FF" opacity="0.1"/>
  <rect x="52" y="74" width="22" height="3" rx="1.5" fill="#1F57FF" opacity="0.08"/>
</svg>