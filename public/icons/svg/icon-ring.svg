<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 概念 8：四色环 - 四种颜色的象限环，代表多窗口管理 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#0D1117"/>
  <!-- 四个彩色象限弧组成一个环 -->
  <!-- 上左 - 蓝 -->
  <path d="M64 24 A40 40 0 0 1 98.6 49.4" fill="none" stroke="#1F57FF" stroke-width="14" stroke-linecap="round"/>
  <!-- 上右 - 黄 -->
  <path d="M98.6 49.4 A40 40 0 0 1 64 104" fill="none" stroke="#FFC312" stroke-width="14" stroke-linecap="round"/>
  <!-- 下右 - 红 -->
  <path d="M64 104 A40 40 0 0 1 29.4 78.6" fill="none" stroke="#FF4757" stroke-width="14" stroke-linecap="round"/>
  <!-- 下左 - 绿/青 -->
  <path d="M29.4 78.6 A40 40 0 0 1 64 24" fill="none" stroke="#2ED573" stroke-width="14" stroke-linecap="round"/>
  <!-- 中心圆 -->
  <circle cx="64" cy="64" r="14" fill="#0D1117"/>
  <circle cx="64" cy="64" r="10" fill="#1F57FF"/>
  <circle cx="64" cy="64" r="5" fill="#fff"/>
</svg>