<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 点阵 - 圆点组成标签图案 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#0D1117"/>
  <!-- 点阵网格 10x10 -->
  <g opacity="0.06">
    <circle cx="16" cy="16" r="2" fill="#fff"/><circle cx="32" cy="16" r="2" fill="#fff"/>
    <circle cx="48" cy="16" r="2" fill="#fff"/><circle cx="64" cy="16" r="2" fill="#fff"/>
    <circle cx="80" cy="16" r="2" fill="#fff"/><circle cx="96" cy="16" r="2" fill="#fff"/>
    <circle cx="112" cy="16" r="2" fill="#fff"/>
    <circle cx="16" cy="32" r="2" fill="#fff"/><circle cx="112" cy="32" r="2" fill="#fff"/>
    <circle cx="16" cy="48" r="2" fill="#fff"/><circle cx="112" cy="48" r="2" fill="#fff"/>
    <circle cx="16" cy="64" r="2" fill="#fff"/><circle cx="112" cy="64" r="2" fill="#fff"/>
    <circle cx="16" cy="80" r="2" fill="#fff"/><circle cx="112" cy="80" r="2" fill="#fff"/>
    <circle cx="16" cy="96" r="2" fill="#fff"/><circle cx="112" cy="96" r="2" fill="#fff"/>
    <circle cx="16" cy="112" r="2" fill="#fff"/><circle cx="112" cy="112" r="2" fill="#fff"/>
    <circle cx="32" cy="112" r="2" fill="#fff"/><circle cx="48" cy="112" r="2" fill="#fff"/>
    <circle cx="64" cy="112" r="2" fill="#fff"/><circle cx="80" cy="112" r="2" fill="#fff"/>
    <circle cx="96" cy="112" r="2" fill="#fff"/>
  </g>
  <!-- 高亮点组成 T（标签）形 -->
  <defs>
    <radialGradient id="dot-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#0055FF"/>
    </radialGradient>
  </defs>
  <!-- T 字形用大亮点点出 -->
  <circle cx="32" cy="36" r="4" fill="url(#dot-glow)" opacity="0.9"/>
  <circle cx="48" cy="36" r="4" fill="url(#dot-glow)" opacity="0.9"/>
  <circle cx="64" cy="36" r="4" fill="url(#dot-glow)" opacity="0.9"/>
  <circle cx="80" cy="36" r="4" fill="url(#dot-glow)" opacity="0.9"/>
  <circle cx="96" cy="36" r="4" fill="url(#dot-glow)" opacity="0.9"/>
  <circle cx="64" cy="52" r="4" fill="url(#dot-glow)" opacity="0.8"/>
  <circle cx="64" cy="68" r="4" fill="url(#dot-glow)" opacity="0.7"/>
  <circle cx="64" cy="84" r="4" fill="url(#dot-glow)" opacity="0.6"/>
  <!-- 轨迹淡化 -->
  <circle cx="32" cy="52" r="2" fill="#00E5FF" opacity="0.2"/>
  <circle cx="48" cy="52" r="2" fill="#00E5FF" opacity="0.2"/>
  <circle cx="80" cy="52" r="2" fill="#00E5FF" opacity="0.15"/>
  <circle cx="96" cy="52" r="2" fill="#00E5FF" opacity="0.15"/>
  <circle cx="64" cy="100" r="2" fill="#00E5FF" opacity="0.3"/>
</svg>