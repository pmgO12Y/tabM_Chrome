<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 概念 9：粗体定位 - 十字瞄准 + 找到的标签 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#fff"/>
  <!-- 粗十字瞄准线 -->
  <line x1="64" y1="16" x2="64" y2="48" stroke="#1F57FF" stroke-width="6" stroke-linecap="round"/>
  <line x1="64" y1="80" x2="64" y2="112" stroke="#1F57FF" stroke-width="6" stroke-linecap="round"/>
  <line x1="16" y1="64" x2="48" y2="64" stroke="#1F57FF" stroke-width="6" stroke-linecap="round"/>
  <line x1="80" y1="64" x2="112" y2="64" stroke="#1F57FF" stroke-width="6" stroke-linecap="round"/>
  <!-- 靶心圆 -->
  <circle cx="64" cy="64" r="18" fill="none" stroke="#FF4757" stroke-width="6"/>
  <circle cx="64" cy="64" r="6" fill="#FF4757"/>
  <!-- 被定位到的标签（右下角） -->
  <rect x="72" y="76" width="36" height="14" rx="4" fill="#1F57FF" opacity="0.15"/>
  <rect x="72" y="76" width="36" height="14" rx="4" stroke="#FF4757" stroke-width="2" opacity="0.5"/>
  <rect x="76" y="79" width="6" height="8" rx="2" fill="#FF4757" opacity="0.5"/>
  <rect x="84" y="80" width="18" height="5" rx="2" fill="#1F57FF" opacity="0.2"/>
</svg>