<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 概念 8：抽象字母 T + 标签元素 -->
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="128" y2="128">
      <stop offset="0%" stop-color="#0F1B33"/>
      <stop offset="50%" stop-color="#1A3A7A"/>
      <stop offset="100%" stop-color="#1F57FF"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="24" fill="url(#bg8)"/>
  <!-- 抽象 T：由标签页形状构成 -->
  <!-- T 的横杠 - 由展开的标签页构成 -->
  <rect x="16" y="22" width="96" height="18" rx="6" fill="#fff" opacity="0.9"/>
  <rect x="16" y="22" width="96" height="18" rx="6" fill="#1f57ff" opacity="0.08"/>
  <rect x="22" y="27" width="12" height="8" rx="3" fill="#1f57ff" opacity="0.2"/>
  <rect x="38" y="28" width="40" height="6" rx="3" fill="#1f57ff" opacity="0.12"/>
  <rect x="82" y="28" width="24" height="6" rx="3" fill="#1f57ff" opacity="0.08"/>
  <!-- T 的竖杠 - 标签页列表 -->
  <rect x="50" y="40" width="28" height="68" rx="5" fill="#fff" opacity="0.85"/>
  <rect x="50" y="40" width="28" height="14" rx="5" fill="#E8EEFF"/>
  <rect x="50" y="49" width="28" height="5" fill="#E8EEFF"/>
  <rect x="55" y="46" width="18" height="4" rx="2" fill="#1f57ff" opacity="0.15"/>
  <!-- 竖杠内容 -->
  <rect x="55" y="59" width="18" height="3" rx="1.5" fill="#1f57ff" opacity="0.12"/>
  <rect x="55" y="65" width="14" height="3" rx="1.5" fill="#1f57ff" opacity="0.08"/>
  <rect x="55" y="71" width="16" height="3" rx="1.5" fill="#1f57ff" opacity="0.06"/>
  <rect x="55" y="77" width="12" height="3" rx="1.5" fill="#1f57ff" opacity="0.05"/>
  <rect x="55" y="83" width="15" height="3" rx="1.5" fill="#1f57ff" opacity="0.04"/>
  <!-- 装饰性点 -->
  <circle cx="55" cy="96" r="2" fill="#1f57ff" opacity="0.15"/>
  <circle cx="62" cy="96" r="2" fill="#1f57ff" opacity="0.1"/>
  <circle cx="69" cy="96" r="2" fill="#1f57ff" opacity="0.08"/>
</svg>