<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 概念 3：极简边缘 - 粗轮廓 + 三色点 + 着色边缘 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#fff"/>
  <!-- 粗圆角方形轮廓 -->
  <rect x="16" y="16" width="96" height="96" rx="16" fill="none" stroke="#1F57FF" stroke-width="8"/>
  <!-- 三色装饰点（左上角） -->
  <circle cx="34" cy="34" r="5" fill="#FF4757"/>
  <circle cx="48" cy="34" r="5" fill="#FFC312"/>
  <circle cx="62" cy="34" r="5" fill="#1F57FF"/>
  <!-- 右侧加粗彩色侧边栏线 -->
  <rect x="88" y="32" width="8" height="64" rx="4" fill="#FF4757"/>
  <!-- 内列表线 -->
  <rect x="36" y="52" width="40" height="4" rx="2" fill="#1F57FF" opacity="0.15"/>
  <rect x="36" y="62" width="32" height="4" rx="2" fill="#1F57FF" opacity="0.1"/>
  <rect x="36" y="72" width="36" height="4" rx="2" fill="#1F57FF" opacity="0.08"/>
</svg>