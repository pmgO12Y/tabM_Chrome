<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 概念 3：标签树 - 层级结构树形图标 -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="128" y2="128">
      <stop offset="0%" stop-color="#0F2B5E"/>
      <stop offset="100%" stop-color="#1F57FF"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="24" fill="url(#bg3)"/>
  <!-- 树形主干 -->
  <line x1="30" y1="20" x2="30" y2="108" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.15"/>
  <!-- 树形分支 1 -->
  <line x1="30" y1="35" x2="55" y2="35" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <rect x="55" y="28" width="55" height="14" rx="4" fill="#fff" opacity="0.2"/>
  <rect x="60" y="32" width="12" height="6" rx="3" fill="#1f57ff" opacity="0.3"/>
  <rect x="76" y="33" width="28" height="4" rx="2" fill="#fff" opacity="0.25"/>
  <!-- 树形分支 2 -->
  <line x1="30" y1="55" x2="45" y2="55" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <rect x="45" y="48" width="65" height="14" rx="4" fill="#fff" opacity="0.3"/>
  <rect x="50" y="52" width="12" height="6" rx="3" fill="#1f57ff" opacity="0.4"/>
  <rect x="66" y="53" width="38" height="4" rx="2" fill="#fff" opacity="0.35"/>
  <!-- 树形分支 3（带展开折叠三角） -->
  <line x1="30" y1="75" x2="45" y2="75" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
  <rect x="45" y="68" width="55" height="14" rx="4" fill="#fff" opacity="0.15"/>
  <rect x="50" y="72" width="12" height="6" rx="3" fill="#1f57ff" opacity="0.2"/>
  <rect x="66" y="73" width="28" height="4" rx="2" fill="#fff" opacity="0.2"/>
  <!-- 折叠三角 -->
  <polyline points="37,71 42,75 37,79" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
  <!-- 分支 3 子项 -->
  <line x1="42" y1="82" x2="55" y2="82" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <rect x="55" y="82" width="40" height="10" rx="3" fill="#fff" opacity="0.1"/>
  <line x1="42" y1="92" x2="55" y2="92" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.08"/>
  <rect x="55" y="92" width="35" height="10" rx="3" fill="#fff" opacity="0.07"/>
</svg>