<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 概念 5：标签定位 - 靶心 + 标签 -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="128" y2="128">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1A3A6B"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="24" fill="url(#bg5)"/>
  <!-- 背景标签列 -->
  <rect x="20" y="18" width="60" height="12" rx="3" fill="#fff" opacity="0.08"/>
  <rect x="20" y="34" width="50" height="12" rx="3" fill="#fff" opacity="0.06"/>
  <rect x="20" y="50" width="65" height="12" rx="3" fill="#fff" opacity="0.05"/>
  <rect x="20" y="82" width="55" height="12" rx="3" fill="#fff" opacity="0.05"/>
  <rect x="20" y="98" width="60" height="12" rx="3" fill="#fff" opacity="0.08"/>
  <!-- 瞄准靶心 -->
  <circle cx="74" cy="64" r="32" fill="none" stroke="#fff" stroke-width="2" opacity="0.15"/>
  <circle cx="74" cy="64" r="22" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.2"/>
  <circle cx="74" cy="64" r="12" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <circle cx="74" cy="64" r="5" fill="#1f57ff" opacity="0.5"/>
  <circle cx="74" cy="64" r="2" fill="#fff"/>
  <!-- 十字瞄准线 -->
  <line x1="74" y1="24" x2="74" y2="42" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="74" y1="86" x2="74" y2="104" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="34" y1="64" x2="52" y2="64" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <line x1="96" y1="64" x2="114" y2="64" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.25"/>
  <!-- 高亮定位到的标签 -->
  <rect x="20" y="66" width="70" height="12" rx="3" fill="#1f57ff" opacity="0.3"/>
  <rect x="20" y="66" width="70" height="12" rx="3" stroke="#fff" stroke-width="1" opacity="0.3"/>
</svg>