<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 禅意 - 极简一笔画标签 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#FAFAFA"/>
  <!-- 渐变背景圆 -->
  <circle cx="64" cy="64" r="48" fill="#F0F4FF"/>
  <circle cx="64" cy="64" r="48" fill="none" stroke="#E8EEFF" stroke-width="1"/>
  <!-- 一笔画：流畅的标签轮廓 -->
  <path d="M34 48
           C34 38, 42 34, 50 34
           L84 34
           C92 34, 96 38, 96 48
           L96 80
           C96 88, 92 92, 84 92
           L48 92
           C40 92, 34 88, 34 80
           C34 72, 34 56, 34 48 Z"
        fill="none" stroke="#1F57FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 顶部标签横条一笔 -->
  <path d="M34 46
           C34 38, 40 34, 48 34
           L82 34
           C90 34, 96 38, 96 46"
        fill="none" stroke="#1F57FF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 内部留白线条 -->
  <path d="M44 52 C46 52, 80 52, 82 52" fill="none" stroke="#1F57FF" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
  <path d="M44 60 C46 60, 72 60, 74 60" fill="none" stroke="#1F57FF" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <path d="M44 68 C46 68, 76 68, 78 68" fill="none" stroke="#1F57FF" stroke-width="1.5" stroke-linecap="round" opacity="0.1"/>
  <!-- 红色提神点 -->
  <circle cx="44" cy="42" r="2.5" fill="#FF4757" opacity="0.6"/>
</svg>