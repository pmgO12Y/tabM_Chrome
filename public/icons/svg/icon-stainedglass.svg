<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 彩绘玻璃 - 黑色边框 + 色块 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#1a1a1a"/>
  <!-- 外框 -->
  <rect x="8" y="8" width="112" height="112" rx="18" fill="none" stroke="#111" stroke-width="6"/>
  <!-- 中框 -->
  <rect x="20" y="20" width="88" height="88" rx="10" fill="none" stroke="#111" stroke-width="5"/>
  <!-- 内部十字框 -->
  <line x1="64" y1="20" x2="64" y2="108" stroke="#111" stroke-width="4"/>
  <line x1="20" y1="64" x2="108" y2="64" stroke="#111" stroke-width="4"/>
  <!-- 上左 - 蓝 -->
  <rect x="20" y="20" width="44" height="44" rx="0" fill="#1F57FF" opacity="0.9"/>
  <!-- 上右 - 黄 -->
  <rect x="64" y="20" width="44" height="44" rx="0" fill="#FFC312" opacity="0.85"/>
  <!-- 下左 - 红 -->
  <rect x="20" y="64" width="44" height="44" rx="0" fill="#FF4757" opacity="0.85"/>
  <!-- 下右 - 绿 -->
  <rect x="64" y="64" width="44" height="44" rx="0" fill="#2ED573" opacity="0.85"/>
  <!-- 中心小圆（标签指示） -->
  <circle cx="64" cy="64" r="10" fill="#fff" opacity="0.2"/>
  <circle cx="64" cy="64" r="6" fill="none" stroke="#111" stroke-width="3"/>
  <circle cx="64" cy="64" r="3" fill="#fff" opacity="0.4"/>
  <!-- 高光纹理 -->
  <line x1="24" y1="24" x2="60" y2="60" stroke="#fff" stroke-width="1" opacity="0.08"/>
  <line x1="68" y1="24" x2="104" y2="60" stroke="#fff" stroke-width="1" opacity="0.08"/>
  <line x1="24" y1="68" x2="60" y2="104" stroke="#fff" stroke-width="1" opacity="0.08"/>
</svg>