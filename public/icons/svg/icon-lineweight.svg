<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 线重对比 - 极粗到极细 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#fff"/>
  <!-- 竖线：从极粗到极细 -->
  <!-- 最粗 -->
  <line x1="64" y1="20" x2="64" y2="108" stroke="#1F57FF" stroke-width="20" stroke-linecap="round"/>
  <!-- 中粗 -->
  <line x1="64" y1="20" x2="64" y2="108" stroke="#fff" stroke-width="10" stroke-linecap="round"/>
  <!-- 中细 -->
  <line x1="64" y1="20" x2="64" y2="108" stroke="#1F57FF" stroke-width="4" stroke-linecap="round"/>
  <!-- 最细 -->
  <line x1="64" y1="20" x2="64" y2="108" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 横线（标签顶部） -->
  <line x1="20" y1="32" x2="108" y2="32" stroke="#1F57FF" stroke-width="16" stroke-linecap="round"/>
  <line x1="20" y1="32" x2="108" y2="32" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
  <!-- 红色强调线 -->
  <line x1="20" y1="32" x2="108" y2="32" stroke="#FF4757" stroke-width="2" stroke-linecap="round"/>
  <!-- 底部微细节 -->
  <line x1="38" y1="72" x2="90" y2="72" stroke="#1F57FF" stroke-width="1.5" opacity="0.15"/>
  <line x1="38" y1="78" x2="82" y2="78" stroke="#1F57FF" stroke-width="1" opacity="0.1"/>
  <line x1="38" y1="84" x2="86" y2="84" stroke="#1F57FF" stroke-width="0.5" opacity="0.08"/>
</svg>