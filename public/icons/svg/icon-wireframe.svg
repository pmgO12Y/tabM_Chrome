<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 线框 - 3D 线框未来感 -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#0A0A1A"/>
  <!-- 3D 线框立方 -->
  <!-- 后面 -->
  <rect x="30" y="30" width="50" height="50" rx="4" fill="none" stroke="#1F57FF" stroke-width="1" opacity="0.2"/>
  <!-- 连接线 -->
  <line x1="30" y1="30" x2="48" y2="48" stroke="#1F57FF" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="30" x2="98" y2="48" stroke="#1F57FF" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="80" x2="48" y2="98" stroke="#1F57FF" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="80" x2="98" y2="98" stroke="#1F57FF" stroke-width="1" opacity="0.3"/>
  <!-- 前面 -->
  <rect x="48" y="48" width="50" height="50" rx="4" fill="none" stroke="#00E5FF" stroke-width="1.5"/>
  <!-- 前面高亮边 -->
  <rect x="48" y="48" width="50" height="50" rx="4" fill="none" stroke="#00E5FF" stroke-width="3" opacity="0.15"/>
  <!-- X 轴 -->
  <line x1="48" y1="48" x2="80" y2="48" stroke="#FF4757" stroke-width="1"/>
  <line x1="48" y1="48" x2="48" y2="80" stroke="#2ED573" stroke-width="1"/>
  <!-- 内部标签图标 -->
  <rect x="60" y="60" width="26" height="20" rx="3" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <line x1="60" y1="66" x2="86" y2="66" stroke="#fff" stroke-width="1" opacity="0.2"/>
  <line x1="60" y1="72" x2="80" y2="72" stroke="#fff" stroke-width="1" opacity="0.12"/>
  <!-- 扫描点 -->
  <circle cx="73" cy="60" r="2" fill="#00E5FF" opacity="0.6"/>
</svg>