name: Build Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Zip dist folder
        run: cd release/v*/dist && zip -r ../../../chrome-tab-manager.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-tab-manager
          path: chrome-tab-manager.zip
