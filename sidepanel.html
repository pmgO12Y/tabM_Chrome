<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Tab Sidebar Manager</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #ffffff;
        font-family: "IBM Plex Sans", "PingFang SC", "Hiragino Sans GB", sans-serif;
      }

      body {
      }

      #root {
        width: 100%;
        height: 100%;
      }

      .boot-splash {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 18px;
        background: #ffffff;
        transition: opacity 160ms ease;
        z-index: 9999;
      }

      .boot-splash__card {
        width: min(100%, 360px);
        border-radius: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        padding: 18px 8px;
        display: grid;
        gap: 8px;
        text-align: center;
        color: #172033;
      }

      .boot-splash__title,
      .boot-splash__body {
        margin: 0;
      }

      .boot-splash__title {
        font-size: 15px;
        font-weight: 600;
      }

      .boot-splash__body {
        font-size: 12px;
        color: rgba(23, 32, 51, 0.68);
      }

      .boot-splash--timeout .boot-splash__spinner {
        display: none;
      }

      .boot-splash--timeout .boot-splash__title {
        color: #16213a;
      }

      .boot-splash--timeout .boot-splash__body {
        color: rgba(22, 33, 58, 0.82);
      }

      body[data-app-ready="true"] .boot-splash {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" class="boot-splash" aria-live="polite">
      <div class="boot-splash__card">
        <p class="boot-splash__title">Tab Sidebar Manager</p>
        <p class="boot-splash__body">Starting the side panel and reading tabs…</p>
      </div>
    </div>
    <div id="root"></div>
    <script src="/sidepanel-boot.js"></script>
    <script type="module" src="/src/sidepanel/main.tsx"></script>
  </body>
</html>
